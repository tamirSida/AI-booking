# Netlify build config for the Next.js app.
# Build command + publish directory are standard for Next.js. The Netlify
# Next.js plugin handles SSR/route-handler runtime automatically.

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Cache node_modules between builds for faster deploys.
[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
