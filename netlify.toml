# Netlify build config for the Next.js app.
# Build command + publish directory are standard for Next.js. The Netlify
# Next.js plugin handles SSR/route-handler runtime automatically.

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Cache node_modules between builds for faster deploys.
[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  # Skip secrets scanning for env vars that are *intentionally* public.
  # Firebase web SDK config (NEXT_PUBLIC_*) gets inlined into the browser
  # bundle — that's by design; the API key is a project identifier, not a
  # secret. Real auth comes from Firebase Auth + Firestore rules.
  # Docs: https://firebase.google.com/docs/projects/api-keys
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_APP_ID"
